name: Release

on:
  release:
    types: [published]

jobs:
  discord:
    runs-on: ubuntu-latest
    if: ${{ vars.DISCORD_WEBHOOK_URL != '' }}
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ vars.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          notes=$(gh release view "$TAG" --json body --jq '.body' 2>/dev/null || echo "")
          export NOTES="$notes"

          payload=$(python3 -c "
          import json, os

          tag = os.environ['TAG']
          release_url = os.environ['RELEASE_URL']
          notes = os.environ.get('NOTES', '')

          if len(notes) > 3800:
              notes = notes[:3800] + '\n\n*... see full notes on GitHub*'

          embed = {
              'title': f'arcdps-axipulse {tag}',
              'url': release_url,
              'description': notes or 'A new version of arcdps-axipulse is available!',
              'color': 0x10B981,
              'thumbnail': {'url': 'https://raw.githubusercontent.com/darkharasho/arcdps-axipulse/main/src/assets/axipulse-logo.png'},
              'footer': {'text': 'arcdps-axipulse Release'},
          }

          print(json.dumps({
              'embeds': [embed],
          }))
          ")

          curl -s -H 'Content-Type: application/json' -d "$payload" "$DISCORD_WEBHOOK_URL"
